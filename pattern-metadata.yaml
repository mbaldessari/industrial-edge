ci_url: https://validatedpatterns.io/ci/?pattern=industrialedge 
# can be sandbox, tested or maintained
tier: tested
owners: mbaldessari, darkdoc
requirements:
  hub: # Main cluster
    compute:
      platform:
        gcp:
          replicas: 5
          type: n1-standard-16
        azure:
          replicas: 5
          type: Standard_D16s_v5
        aws:
          replicas: 3
          type: m5.4xlarge
    controlPlane:
      platform:
        gcp:
          replicas: 3
          type: n1-standard-16
        azure:
          replicas: 3
          type: Standard_D16s_v3
        aws:
          replicas: 3
          type: m5.4xlarge
  spoke: # optional - represents the clusters imported into ACM
    compute:
      platform:
        gcp:
          replicas: 3
          type: n1-standard-16
        azure:
          replicas: 3
          type: Standard_D16s_v5
        aws:
          replicas: 3
          type: m5.2xlarge
    controlPlane:
      platform:
        gcp:
          replicas: 3
          type: n1-standard-16
        azure:
          replicas: 3
          type: Standard_D16s_v5
        aws:
          replicas: 3
          type: m5.2xlarge
    
external_requirements:
# external quay, s3 bucket, agof tokens to access paywalled material, manifests, rag-llm hw (only selected regions)
